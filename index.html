<style>
/* Page layout and canvas styling section */
#content { max-width: 720px; margin: 0 auto; padding-bottom: 100px; } /* centers the main content and adds extra bottom space for the footer */
#w3-canvas-label { margin-top: 10px; }
#a { display: block; margin: 18px 0; background-color: #ffffff; } /* ensures the canvas stands out against the page background */
.canvas-buttons a { margin: 4px 4px 4px 0; } /* spaces the buttons evenly for better usability */
.hidden { display: none; } /* hides the image from page view while still allowing JavaScript to use it */
</style>

<body>
<div id="header" class="w3-container w3-flat-carrot">
	<h1>HTML5-Canvas</h1>
</div>
	
<div id="content" class="w3-container">
	<!-- Canvas area: this is where the drawing surface is created and displayed -->
	<canvas id="a" width="300" height="190" style="border:2px solid #000000;"></canvas> <!-- Creates the canvas with a black border so the drawing area is visible immediately -->
	<p id="w3-canvas-label">Click the buttons below to create artwork on the canvas. Use the third button to enter drawing mode and draw on the canvas with your mouse.</p> <!-- Provides instructions and tells the user that the third button enables mouse drawing -->

	<div class="canvas-buttons">
		<a onclick="drawRect();" class="w3-btn w3-grey w3-round"> Draw Artwork!</a> <!-- Button to draw the improved artwork scene on the canvas -->
		<a onclick="my_name();" class="w3-btn w3-grey w3-round"> Write Name</a> <!-- Button to add a name label onto the canvas artwork -->
		<a onclick="enableDrawing();" class="w3-btn w3-grey w3-round"> Draw with Mouse</a> <!-- Button to enable drawing mode so the user can paint with the mouse -->
		<a onclick="clear_canvas();" class="w3-btn w3-grey w3-round"> Clear Canvas!</a> <!-- Button to clear the entire canvas so the user can start again -->
	</div>
</div>

<script>
// Canvas artwork functions: all drawing actions happen inside the <script> block.
var a_canvas = document.getElementById('a'); // Select the canvas element by id and keep it available for all functions.
var a_context = a_canvas.getContext('2d'); // Use the 2D drawing context for canvas operations.
var drawingEnabled = false; // Whether mouse drawing mode is active.
var isMouseDown = false; // Whether the user is currently holding the mouse button down.
var lastX = 0; // Last x position used while drawing.
var lastY = 0; // Last y position used while drawing.

a_canvas.addEventListener('mousedown', function(event) {
	if (!drawingEnabled) return; // Only draw when mouse drawing mode is enabled.
	isMouseDown = true; // Start a new line.
	lastX = event.offsetX; // Save the starting x coordinate.
	lastY = event.offsetY; // Save the starting y coordinate.
});

a_canvas.addEventListener('mousemove', function(event) {
	if (!drawingEnabled || !isMouseDown) return; // Only draw while dragging the mouse.
	a_context.beginPath();
	a_context.moveTo(lastX, lastY); // Begin from the last position.
	lastX = event.offsetX; // Update the last x coordinate.
	lastY = event.offsetY; // Update the last y coordinate.
	a_context.lineTo(lastX, lastY); // Draw to the new position.
	a_context.stroke();
});

a_canvas.addEventListener('mouseup', function() {
	isMouseDown = false; // Stop drawing when the mouse button is released.
});

a_canvas.addEventListener('mouseleave', function() {
	isMouseDown = false; // Stop drawing if the mouse leaves the canvas.
});

function drawRect() { // Draws a polished artwork scene with multiple shapes, arcs, and lines.
	var a_canvas = document.getElementById('a'); // Select the canvas element by its id attribute.
	var a_context = a_canvas.getContext('2d'); // Use the 2D drawing context for all canvas operations.

	// Clear the canvas before drawing so each click starts fresh.
	a_context.clearRect(0, 0, a_canvas.width, a_canvas.height);

	// Draw the sky background using a large blue rectangle.
	a_context.fillStyle = '#87CEEB'; // sky blue
	a_context.fillRect(0, 0, 300, 190); // full canvas background

	// Draw the ground as a green rectangle along the bottom.
	a_context.fillStyle = '#3B7A57'; // green ground
	a_context.fillRect(0, 148, 300, 42); // ground height of 42 pixels

	// Draw the rocket body with a silver rectangle.
	a_context.fillStyle = '#C0C0C0'; // silver color for the rocket
	a_context.fillRect(120, 50, 60, 90); // rocket body shape

	// Draw the rocket nose cone as a filled triangle.
	a_context.beginPath();
	a_context.moveTo(120, 50);
	a_context.lineTo(150, 18);
	a_context.lineTo(180, 50);
	a_context.closePath();
	a_context.fillStyle = '#D32F2F'; // red nose cone color
	a_context.fill();
	a_context.strokeStyle = '#000000'; // black outline for sharper edges
	a_context.lineWidth = 2;
	a_context.stroke();

	// Draw a circular window using arc.
	a_context.beginPath();
	a_context.arc(150, 85, 16, 0, 2 * Math.PI); // full circle for the rocket window
	a_context.fillStyle = '#B0E0E6'; // light blue window fill
	a_context.fill();
	a_context.stroke();

	// Draw a detail line down the center of the rocket.
	a_context.beginPath();
	a_context.moveTo(150, 110);
	a_context.lineTo(150, 138);
	a_context.strokeStyle = '#000000'; // black line color
	a_context.lineWidth = 2;
	a_context.stroke();

	// Draw rocket flame using a filled triangle and an arc for flames.
	a_context.beginPath();
	a_context.moveTo(130, 140);
	a_context.lineTo(150, 178);
	a_context.lineTo(170, 140);
	a_context.closePath();
	a_context.fillStyle = '#FFB300'; // bright flame color
	a_context.fill();

	a_context.beginPath();
	a_context.arc(150, 150, 18, 0, Math.PI, true); // bottom half circle for rounded flame
	a_context.fillStyle = '#FF6D00'; // orange flame accent
	a_context.fill();

	// Draw a few stars in the sky using small circles.
	for (var starX = 35; starX <= 255; starX += 55) {
		a_context.beginPath();
		a_context.arc(starX, 35 + (starX % 24), 4, 0, 2 * Math.PI);
		a_context.fillStyle = '#FFF9C4'; // light yellow star color
		a_context.fill();
	}

	// Draw the horizon line where the sky and ground meet.
	a_context.beginPath();
	a_context.moveTo(0, 148);
	a_context.lineTo(300, 148);
	a_context.strokeStyle = '#245E1B'; // darker line for ground edge
	a_context.lineWidth = 2;
	a_context.stroke();
};

function my_name() { // Writes the name label onto the canvas artwork.
	var a_canvas = document.getElementById('a'); // Select the canvas element by id.
	var a_context = a_canvas.getContext('2d'); // Use the 2D drawing context.
	a_context.font = '26px Comic Sans MS'; // Set the font style and size for the text.
	a_context.fillStyle = '#000080'; // Set the text color to dark blue.
	a_context.fillText('Rocket Artist', 62, 180); // Draw the name text near the bottom of the canvas.
};

function enableDrawing() { // Enables mouse drawing mode for the user.
	drawingEnabled = true; // Turn on drawing mode.
	a_context.strokeStyle = '#000000'; // Set the brush color.
	a_context.lineWidth = 2; // Set the brush thickness.
	a_context.lineJoin = 'round'; // Smooth the corners of brush strokes.
	a_context.lineCap = 'round'; // Smooth the ends of brush strokes.
	document.getElementById('w3-canvas-label').textContent = 'Mouse drawing mode is active. Click and drag on the canvas to draw.'; // Update instructions.
};

function clear_canvas() { // Clears the entire canvas so the user can start again.
	a_context.clearRect(0, 0, a_canvas.width, a_canvas.height); // Removes all drawings from the canvas.
	drawingEnabled = false; // Turn off mouse drawing mode when cleared.
	document.getElementById('w3-canvas-label').textContent = 'Click the buttons below to create artwork on the canvas. Use the third button to enter drawing mode and draw on the canvas with your mouse.'; // Restore the original instructions.
};
</script>
